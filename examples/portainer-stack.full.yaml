# Full Portainer / Docker Compose stack for advanced No One Survived deployments.
# Import examples/portainer-stack.full.env.example in Portainer or define the
# variables in the Stack environment variables section.

name: ${STACK_NAME:-no-one-survived}

services:
  no-one-survived:
    image: ghcr.io/dadeeen/no-one-survived-server:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-no-one-survived}
    restart: unless-stopped
    stop_grace_period: ${STOP_GRACE_PERIOD:-180s}

    # Bind to all host interfaces by default. Set HOST_BIND_ADDRESS to a
    # specific LAN address when the ports should not listen everywhere.
    ports:
      - "${HOST_BIND_ADDRESS:-0.0.0.0}:${GAME_PORT:-7777}:${GAME_PORT:-7777}/udp"
      - "${HOST_BIND_ADDRESS:-0.0.0.0}:${QUERY_PORT:-27015}:${QUERY_PORT:-27015}/udp"

    environment:
      # Container identity and runtime
      TZ: ${TZ:-UTC}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      UMASK: ${UMASK:-0027}
      RUNTIME_DIR: ${RUNTIME_DIR:-/run/nos}
      STATE_FILE: ${STATE_FILE:-}
      CONTROL_SOCKET: ${CONTROL_SOCKET:-}
      NOSCTL_TIMEOUT_SECONDS: ${NOSCTL_TIMEOUT_SECONDS:-5}
      HEALTHCHECK_MAX_HEARTBEAT_AGE: ${HEALTHCHECK_MAX_HEARTBEAT_AGE:-600}

      # Network ports and bind address
      GAME_PORT: ${GAME_PORT:-7777}
      QUERY_PORT: ${QUERY_PORT:-27015}
      MULTIHOME: ${MULTIHOME:-0.0.0.0}

      # First start and game updates
      PREPARE_ON_CONTAINER_START: ${PREPARE_ON_CONTAINER_START:-true}
      START_SERVER_ON_CONTAINER_START: ${START_SERVER_ON_CONTAINER_START:-false}
      UPDATE_ON_CONTAINER_START: ${UPDATE_ON_CONTAINER_START:-true}
      UPDATE_ON_WAKE: ${UPDATE_ON_WAKE:-false}
      UPDATE_INTERVAL_SECONDS: ${UPDATE_INTERVAL_SECONDS:-0}
      UPDATE_RETRY_DELAY_SECONDS: ${UPDATE_RETRY_DELAY_SECONDS:-900}
      STEAMCMD_TIMEOUT_SECONDS: ${STEAMCMD_TIMEOUT_SECONDS:-3600}
      VALIDATE_ON_UPDATE: ${VALIDATE_ON_UPDATE:-false}
      START_ON_UPDATE_FAILURE: ${START_ON_UPDATE_FAILURE:-false}

      # Wake on UDP packet. "private" permits common private LAN, container and
      # routed VPN ranges while rejecting public IPv4 sources.
      WAKE_ON_GAME_PORT: ${WAKE_ON_GAME_PORT:-true}
      WAKE_ON_QUERY_PORT: ${WAKE_ON_QUERY_PORT:-true}
      WAKE_BIND_ADDRESS: ${WAKE_BIND_ADDRESS:-0.0.0.0}
      WAKE_SOURCE_POLICY: ${WAKE_SOURCE_POLICY:-private}
      WAKE_ALLOWED_NETWORKS: ${WAKE_ALLOWED_NETWORKS:-}
      WAKE_PACKET_COUNT: ${WAKE_PACKET_COUNT:-1}
      WAKE_PACKET_WINDOW_SECONDS: ${WAKE_PACKET_WINDOW_SECONDS:-5}
      WAKE_ARM_DELAY_SECONDS: ${WAKE_ARM_DELAY_SECONDS:-5}
      WAKE_IGNORE_EMPTY_PACKETS: ${WAKE_IGNORE_EMPTY_PACKETS:-true}

      # Stop the game process after one hour with no players. The container
      # stays healthy and keeps the lightweight UDP wake listener running.
      AUTO_SLEEP_ENABLED: ${AUTO_SLEEP_ENABLED:-true}
      IDLE_TIMEOUT_SECONDS: ${IDLE_TIMEOUT_SECONDS:-3600}
      IDLE_CHECK_INTERVAL_SECONDS: ${IDLE_CHECK_INTERVAL_SECONDS:-30}
      MIN_UPTIME_SECONDS: ${MIN_UPTIME_SECONDS:-900}
      IDLE_MIN_SUCCESSFUL_QUERIES: ${IDLE_MIN_SUCCESSFUL_QUERIES:-3}
      A2S_TIMEOUT_SECONDS: ${A2S_TIMEOUT_SECONDS:-2}
      A2S_QUERY_HOST: ${A2S_QUERY_HOST:-}
      ALLOW_LOG_ONLY_IDLE: ${ALLOW_LOG_ONLY_IDLE:-false}

      # Empty game settings are treated as unset. Import the matching env
      # template or set only values that should overwrite the existing Game.ini.
      SERVER_NAME: ${SERVER_NAME:-}
      SAVE_NAME: ${SAVE_NAME:-}
      REGION: ${REGION:-}
      MAP: ${MAP:-}
      MAX_PLAYERS: ${MAX_PLAYERS:-}
      REQUIRE_PASSWORD: ${REQUIRE_PASSWORD:-true}
      ZOMBIES_PER_PLAYER: ${ZOMBIES_PER_PLAYER:-}
      PVP: ${PVP:-}
      ZOMBIE_ATTACK: ${ZOMBIE_ATTACK:-}
      ZOMBIE_ATTACK_DAY: ${ZOMBIE_ATTACK_DAY:-}
      ATTACK_ZOMBIE_NUM: ${ATTACK_ZOMBIE_NUM:-}
      ZOMBIE_NUM: ${ZOMBIE_NUM:-}
      RUN_ZOMBIE_PERCENT: ${RUN_ZOMBIE_PERCENT:-}
      ZOMBIE_STRENGTH: ${ZOMBIE_STRENGTH:-}
      SPECIAL_ZOMBIE: ${SPECIAL_ZOMBIE:-}
      YEAR_DAYS: ${YEAR_DAYS:-}
      DAY_LENGTH: ${DAY_LENGTH:-}
      PERMADEATH: ${PERMADEATH:-}
      MATERIAL_AMOUNT: ${MATERIAL_AMOUNT:-}
      ITEM_SPAWN: ${ITEM_SPAWN:-}
      VIRUS_FATALITY_RATE: ${VIRUS_FATALITY_RATE:-}
      NOVICE_GIFT_BAG: ${NOVICE_GIFT_BAG:-}
      NPC_ITEM_SPAWN: ${NPC_ITEM_SPAWN:-}
      GAME_INI_OVERRIDES: ${GAME_INI_OVERRIDES:-}
      GAME_INI_OVERRIDES_FILE: ${GAME_INI_OVERRIDES_FILE:-}

      # Passwords are read from host files mounted read-only below.
      SERVER_PASSWORD_FILE: /run/secrets/nos_server_password
      ADMIN_PASSWORD_FILE: /run/secrets/nos_admin_password

      # Process recovery and compatibility
      SERVER_READY_TIMEOUT_SECONDS: ${SERVER_READY_TIMEOUT_SECONDS:-300}
      SERVER_STOP_TIMEOUT_SECONDS: ${SERVER_STOP_TIMEOUT_SECONDS:-90}
      RESTART_ON_CRASH: ${RESTART_ON_CRASH:-true}
      CRASH_RESTART_DELAY_SECONDS: ${CRASH_RESTART_DELAY_SECONDS:-15}
      MAX_CRASH_RESTARTS: ${MAX_CRASH_RESTARTS:-3}
      CRASH_RESTART_RESET_SECONDS: ${CRASH_RESTART_RESET_SECONDS:-600}
      EXTRA_SERVER_ARGS: ${EXTRA_SERVER_ARGS:-}
      RESET_WINEPREFIX: ${RESET_WINEPREFIX:-false}
      RESET_WINEPREFIX_ON_VERSION_CHANGE: ${RESET_WINEPREFIX_ON_VERSION_CHANGE:-true}
      WINEBOOT_TIMEOUT_SECONDS: ${WINEBOOT_TIMEOUT_SECONDS:-600}
      WINEDEBUG: ${WINEDEBUG:--all}
      USE_XVFB: ${USE_XVFB:-true}
      FIX_PERMISSIONS: ${FIX_PERMISSIONS:-true}

    volumes:
      # Compose prefixes this logical volume with the effective project/stack
      # name. With the default name Docker creates no-one-survived_data.
      - data:/data
      - ${SERVER_PASSWORD_PATH:-/opt/games/no-one-survived/secrets/server_password.txt}:/run/secrets/nos_server_password:ro
      - ${ADMIN_PASSWORD_PATH:-/opt/games/no-one-survived/secrets/admin_password.txt}:/run/secrets/nos_admin_password:ro

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"

volumes:
  data:
