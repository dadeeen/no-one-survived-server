# Copy-and-paste Portainer stack.
# Edit the values below directly before deploying.
# Keep the Portainer stack name stable because it determines the data volume name.

services:
  no-one-survived:
    # Replace latest with a tested release tag such as v0.1.0 for stable operation.
    image: ghcr.io/dadeeen/no-one-survived-server:latest
    container_name: no-one-survived
    restart: unless-stopped
    # Allow the supervisor to finish its full graceful Wine shutdown sequence.
    stop_grace_period: 180s

    ports:
      - "7777:7777/udp"
      - "27015:27015/udp"

    environment:
      TZ: UTC
      PUID: "1000"
      PGID: "1000"
      UMASK: "0027"
      # This is the same Wine path used by the image smoke test.
      USE_XVFB: "true"

      GAME_PORT: "7777"
      QUERY_PORT: "27015"

      # Prepare the server, then keep the container alive in low-overhead wake mode.
      START_SERVER_ON_CONTAINER_START: "false"
      AUTO_SLEEP_ENABLED: "true"
      IDLE_TIMEOUT_SECONDS: "3600"
      WAKE_SOURCE_POLICY: private
      WAKE_ALLOWED_NETWORKS: ""

      SERVER_NAME: No One Survived
      SAVE_NAME: MainWorld
      REGION: EU
      MAP: Map01
      MAX_PLAYERS: "8"
      REQUIRE_PASSWORD: "true"

      # Passwords stay outside the stack and are mounted read-only below.
      SERVER_PASSWORD_FILE: /run/secrets/nos_server_password
      ADMIN_PASSWORD_FILE: /run/secrets/nos_admin_password

    volumes:
      - data:/data
      - /opt/games/no-one-survived/secrets/server_password.txt:/run/secrets/nos_server_password:ro
      - /opt/games/no-one-survived/secrets/admin_password.txt:/run/secrets/nos_admin_password:ro

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  data:
