services:
  no-one-survived:
    environment:
      # Explicit empty direct values prevent host variables from conflicting with
      # the mounted _FILE secrets. Empty direct values are treated as unset.
      SERVER_PASSWORD: ""
      ADMIN_PASSWORD: ""
      SERVER_PASSWORD_FILE: /run/secrets/server_password
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
    secrets:
      - server_password
      - admin_password

secrets:
  server_password:
    file: ./secrets/server_password.txt
  admin_password:
    file: ./secrets/admin_password.txt
